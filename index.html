<script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const user = Telegram.WebApp.initDataUnsafe.user || {};
    const userId = user.id || 'anonymous';
    const RECEIVER_ADDRESS = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
        preferredWallets: ['tonkeeper']
    });

    let balance = 0;
    let storage = null;

    // Проверяем, поддерживается ли DeviceStorage
    if (Telegram.WebApp.isVersionAtLeast?.('9.0') && Telegram.WebApp.DeviceStorage) {
        storage = Telegram.WebApp.DeviceStorage;
        console.log('DeviceStorage доступен');
    } else {
        console.log('DeviceStorage НЕ доступен (старая версия Telegram или ограничение)');
    }

    async function loadBalance() {
        if (storage) {
            try {
                const saved = await storage.getItem(`ton_sent_${userId}`);
                const parsed = saved ? parseFloat(saved) : 0;
                balance = isNaN(parsed) ? 0 : parsed;
                console.log('Загружен баланс из хранилища:', balance);
            } catch (e) {
                console.error('Ошибка загрузки из DeviceStorage:', e);
                balance = 0;
            }
        } else {
            balance = 0;
        }
        updateBalance();
    }

    async function saveBalance() {
        if (storage) {
            try {
                await storage.setItem(`ton_sent_${userId}`, balance.toString());
                console.log('Баланс сохранён:', balance);
            } catch (e) {
                console.error('Ошибка сохранения в DeviceStorage:', e);
            }
        } else {
            console.log('Сохранение не выполнено — хранилище недоступно');
        }
    }

    function updateBalance() {
        if (typeof balance !== 'number' || isNaN(balance)) {
            balance = 0;
            console.warn('Balance был NaN → сбросили в 0');
        }
        document.getElementById('profileSpent').innerText = balance.toFixed(4);
    }

    function updateProfile() {
        const name = user.first_name || 'Гость';
        const photo = user.photo_url || 'https://via.placeholder.com/64?text=' + (name[0] || '?');
        document.getElementById('profileName').innerText = name;
        document.getElementById('profileAvatar').src = photo;
        document.getElementById('navAvatar').src = photo;
        document.getElementById('userInfo').innerHTML = `Привет, ${name}!`;
    }
    updateProfile();

    tonConnectUI.onStatusChange(wallet => {
        const connected = !!wallet;
        document.getElementById('connectBtn').innerText = connected ? 'Подключено ✓' : 'Подключить кошелёк';
        document.getElementById('connectBtn').disabled = connected;
        document.getElementById('disconnectBtn').disabled = !connected;
        document.getElementById('sendBtn').disabled = !connected;
        document.getElementById('status').innerText = connected
            ? 'Готово к отправке TON'
            : 'Подключи кошелёк';
    });

    document.getElementById('connectBtn').onclick = async () => {
        try { await tonConnectUI.connectWallet(); } catch(e) {}
    };

    document.getElementById('disconnectBtn').onclick = async () => {
        try { await tonConnectUI.disconnect(); } catch(e) {}
    };

    function setAmount(val) {
        document.getElementById('amount').value = val;
    }

    document.getElementById('sendBtn').onclick = async () => {
        const amt = parseFloat(document.getElementById('amount').value);
        if (isNaN(amt) || amt < 0.001) {
            document.getElementById('status').innerText = 'Минимум 0.001 TON';
            return;
        }
        const nano = Math.floor(amt * 1e9).toString();
        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [{ address: RECEIVER_ADDRESS, amount: nano }]
        };
        try {
            await tonConnectUI.sendTransaction(tx);
            balance += amt;
            await saveBalance();
            updateBalance();
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#3b82f6', '#60a5fa', '#1e40af', '#93c5fd']
            });
            document.getElementById('status').innerText = `Отправлено ${amt.toFixed(3)} TON! Баланс: ${balance.toFixed(4)} TON`;
        } catch (err) {
            document.getElementById('status').innerText = 'Отправка отменена';
            console.error('TX error:', err);
        }
    };

    const homeBtn = document.getElementById('navHome');
    const profileBtn = document.getElementById('navProfile');
    const mainContent = document.getElementById('mainContent');
    const profileContent = document.getElementById('profileContent');

    homeBtn.onclick = () => {
        homeBtn.classList.add('active');
        profileBtn.classList.remove('active');
        mainContent.style.display = 'block';
        profileContent.style.display = 'none';
    };

    profileBtn.onclick = () => {
        homeBtn.classList.remove('active');
        profileBtn.classList.add('active');
        mainContent.style.display = 'none';
        profileContent.style.display = 'block';
    };

    // Запуск
    loadBalance();
    setTimeout(() => tonConnectUI.restoreConnection().catch(() => {}), 800);
</script>
