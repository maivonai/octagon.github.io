<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octagon – TON Connect</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.4.2/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #4a148c, #1a237e, #311b92, #4a148c);
            background-size: 300% 300%;
            animation: gradientFlow 12s ease infinite;
            color: #e0e0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            font-size: 2.4em;
            margin: 30px 0 20px;
            color: #d1c4e9;
            text-shadow: 0 0 15px rgba(209, 196, 233, 0.5);
        }
        #userInfo {
            font-size: 1.4em;
            margin-bottom: 25px;
            color: #b39ddb;
        }
        .controls {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        button {
            padding: 16px;
            font-size: 1.3em;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #connectBtn {
            background: linear-gradient(45deg, #7e57c2, #5e35b1);
        }
        #connectBtn:disabled {
            background: #616161;
            cursor: not-allowed;
        }
        #disconnectBtn {
            background: linear-gradient(45deg, #ef5350, #d32f2f);
        }
        #disconnectBtn:disabled {
            background: #616161;
            cursor: not-allowed;
        }
        .amount-box {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input[type="number"] {
            width: 100%;
            padding: 14px;
            font-size: 1.5em;
            border-radius: 10px;
            border: 1px solid #9575cd;
            background: #311b92;
            color: white;
            text-align: center;
            margin-bottom: 15px;
        }
        .presets {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        .presets button {
            background: #512da8;
            padding: 10px 18px;
            font-size: 1em;
        }
        #sendBtn {
            background: linear-gradient(45deg, #66bb6a, #43a047);
            font-size: 1.6em;
            padding: 20px;
        }
        #sendBtn:disabled {
            background: #616161;
            cursor: not-allowed;
        }
        #status {
            font-size: 1.25em;
            margin-top: 25px;
            color: #fff176;
            min-height: 70px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <h1>Octagon TON</h1>
    <div id="userInfo">Загрузка...</div>

    <div class="controls">
        <button id="connectBtn">Подключить кошелёк</button>
        <button id="disconnectBtn" disabled>Отключить кошелёк</button>
    </div>

    <div class="amount-box">
        <p>Сумма TON:</p>
        <input type="number" id="amount" value="0.1" min="0.001" step="0.001">
        <div class="presets">
            <button onclick="document.getElementById('amount').value=0.01">0.01</button>
            <button onclick="document.getElementById('amount').value=0.05">0.05</button>
            <button onclick="document.getElementById('amount').value=0.1">0.1</button>
            <button onclick="document.getElementById('amount').value=0.5">0.5</button>
        </div>
    </div>

    <button id="sendBtn" disabled>Отправить TON</button>

    <div id="status">Нажми «Подключить кошелёк»</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const user = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('userInfo').innerText = user ? `Привет, ${user.first_name}!` : 'Пользователь не найден';

        const RECEIVER_ADDRESS = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
            walletsListSource: 'https://raw.githubusercontent.com/ton-blockchain/wallets-list/main/wallets-v4.json',
            twaReturnUrl: window.location.href.split('?')[0]
        });

        tonConnectUI.onStatusChange(wallet => {
            const connected = !!wallet;
            document.getElementById('connectBtn').innerText = connected ? 'Подключено ✓' : 'Подключить кошелёк';
            document.getElementById('connectBtn').disabled = connected;
            document.getElementById('disconnectBtn').disabled = !connected;
            document.getElementById('sendBtn').disabled = !connected;
            document.getElementById('status').innerText = connected 
                ? 'Кошелёк готов. Выбери сумму и отправь.' 
                : 'Подключи кошелёк для отправки TON';
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                document.getElementById('status').innerText = 'Открываю список кошельков...';
                await tonConnectUI.connectWallet();
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка: ' + (err.message || 'Попробуй снова');
                console.error(err);
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', async () => {
            try {
                await tonConnectUI.disconnect();
                document.getElementById('status').innerText = 'Кошелёк отключён. Подключи заново.';
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка отключения: ' + err.message;
            }
        });

        function setAmount(val) {
            document.getElementById('amount').value = val;
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const amt = parseFloat(document.getElementById('amount').value);
            if (isNaN(amt) || amt < 0.001) {
                document.getElementById('status').innerText = 'Сумма минимум 0.001 TON';
                return;
            }
            const nano = Math.floor(amt * 1e9).toString();
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{ address: RECEIVER_ADDRESS, amount: nano }]
            };
            document.getElementById('status').innerText = `Отправляю ${amt} TON... Подтверди в кошельке`;
            try {
                const res = await tonConnectUI.sendTransaction(tx);
                document.getElementById('status').innerText = `Успех! Хэш: ${res.boc.slice(0,12)}... Проверь explorer.ton.org`;
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка: ' + (err.message || 'Отменено');
            }
        });

        // Восстановление соединения при загрузке
        setTimeout(() => tonConnectUI.restoreConnection().catch(() => {}), 800);
    </script>
</body>
</html>
