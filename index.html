<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octagon Shop – Stars & TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script> <!-- TON Connect SDK -->
    <style>
        /* Твой предыдущий стиль остаётся, или добавь новый */
        body { font-family: Arial; background: #0f2027; color: white; text-align: center; padding: 20px; }
        button { background: #00c853; color: white; padding: 15px; margin: 10px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        button:disabled { background: gray; }
        #status { margin-top: 20px; color: #ffeb3b; font-size: 20px; }
    </style>
</head>
<body>
    <h1>Octagon Shop с TON</h1>
    <div id="userInfo">Загрузка...</div>

    <!-- Кнопка подключения TON-кошелька -->
    <button id="connectTonBtn">Подключить TON Wallet (Tonkeeper)</button>

    <!-- Кнопка отправки TON -->
    <button id="sendTonBtn" disabled>Отправить 0.1 TON мне</button>

    <div id="status">Нажми "Подключить", чтобы начать</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        // Показ имени пользователя
        const user = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('userInfo').innerText = user ? `Привет, ${user.first_name}!` : 'Пользователь не найден';

        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json', // Твой manifest
            buttonRootId: 'connectTonBtn' // Автоматически меняет кнопку на "Connected" после подключения
        });

        // Кнопка отправки TON (замени MY_TON_ADDRESS на свой реальный адрес)
        const MY_TON_ADDRESS = 'EQCd56VPexb2uPpoD0u25WPIi5vP1H4tnC4f8d7b1o2cT2cS'; // ТВОЙ АДРЕС ЗДЕСЬ!!!
        document.getElementById('sendTonBtn').addEventListener('click', async () => {
            try {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 300, // 5 минут на подтверждение
                    messages: [
                        {
                            address: noir-et-rose.ton, // Адрес получателя (твой кошелёк)
                            amount: '100000000' // 0.1 TON в nanoTON (1 TON = 1000000000 nanoTON)
                        }
                    ]
                };
                const result = await tonConnectUI.sendTransaction(transaction);
                document.getElementById('status').innerText = 'Транзакция отправлена! Хэш: ' + result.boc;
            } catch (error) {
                document.getElementById('status').innerText = 'Ошибка: ' + error.message;
                console.error(error);
            }
        });

        // Включаем кнопку отправки после подключения
        tonConnectUI.on('walletConnected', () => {
            document.getElementById('sendTonBtn').disabled = false;
            document.getElementById('status').innerText = 'Кошелёк подключён! Теперь можно отправить TON.';
        });
    </script>
</body>
</html>
