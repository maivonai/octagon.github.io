<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octagon – Liquid Glass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(30, 20, 60, 0.25);
            --glass-border: rgba(100, 80, 255, 0.18);
            --accent: #bb86fc;
            --text: #e0e0ff;
            --blur: blur(16px) saturate(180%);
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2a0e5e, #0f1a4d, #1e0f4d, #2a0e5e);
            background-size: 300% 300%;
            animation: flow 18s ease infinite;
            color: var(--text);
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            backdrop-filter: var(--blur);
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 2.2em;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(187, 134, 252, 0.6);
        }
        #balance {
            font-size: 1.5em;
            margin: 8px 0 0;
            color: #d1c4e9;
            text-shadow: 0 0 8px rgba(209, 196, 233, 0.4);
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin: 20px 16px;
            width: calc(100% - 32px);
            max-width: 420px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.08),
                        0 8px 32px rgba(0,0,0,0.35);
            transition: transform 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.3em;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 12px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #connectBtn {
            background: linear-gradient(45deg, #7e57c2, #5e35b1);
            color: white;
        }
        #connectBtn:disabled { background: #424242; cursor: not-allowed; }
        #disconnectBtn {
            background: linear-gradient(45deg, #ef5350, #d32f2f);
            color: white;
        }
        #disconnectBtn:disabled { background: #424242; cursor: not-allowed; }
        #sendBtn {
            background: linear-gradient(45deg, #66bb6a, #43a047);
            color: white;
            font-size: 1.5em;
            padding: 20px;
        }
        #sendBtn:disabled { background: #424242; cursor: not-allowed; }
        input[type="number"] {
            width: 100%;
            padding: 14px;
            font-size: 1.4em;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(30, 20, 60, 0.4);
            color: white;
            text-align: center;
            margin-bottom: 16px;
        }
        .presets {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap;
        }
        .presets button {
            background: rgba(94, 53, 177, 0.6);
            color: white;
            padding: 10px 18px;
            font-size: 1em;
            border-radius: 12px;
        }
        #status {
            margin: 24px 16px;
            font-size: 1.2em;
            color: #fff176;
            text-align: center;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Octagon Portal</h1>
        <div id="balance">Твои отправленные TON: 0.00</div>
    </header>

    <div class="glass-card">
        <div id="userInfo">Загрузка...</div>

        <div class="controls">
            <button id="connectBtn">Подключить кошелёк</button>
            <button id="disconnectBtn" disabled>Отключить кошелёк</button>
        </div>

        <div class="amount-box">
            <p>Сумма TON:</p>
            <input type="number" id="amount" value="0.1" min="0.001" step="0.001">
            <div class="presets">
                <button onclick="setAmount(0.01)">0.01</button>
                <button onclick="setAmount(0.05)">0.05</button>
                <button onclick="setAmount(0.1)">0.1</button>
                <button onclick="setAmount(0.5)">0.5</button>
            </div>
        </div>

        <button id="sendBtn" disabled>Отправить TON</button>
    </div>

    <div id="status">Подключи кошелёк для отправки</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const user = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('userInfo').innerText = user ? `Привет, ${user.first_name}!` : 'Пользователь не найден';

        const RECEIVER_ADDRESS = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
            walletsListSource: 'https://raw.githubusercontent.com/ton-blockchain/wallets-list/main/wallets-v4.json',
            twaReturnUrl: window.location.href.split('?')[0],
            preferredWallets: ['tonkeeper']
        });

        // Баланс из localStorage (по user.id для уникальности)
        const userId = user?.id || 'anonymous';
        const balanceKey = `ton_sent_${userId}`;
        let balance = parseFloat(localStorage.getItem(balanceKey)) || 0;
        updateBalance();

        function updateBalance() {
            document.getElementById('balance').innerText = `Твои отправленные TON: ${balance.toFixed(4)}`;
        }

        tonConnectUI.onStatusChange(wallet => {
            const connected = !!wallet;
            document.getElementById('connectBtn').innerText = connected ? 'Подключено ✓' : 'Подключить кошелёк';
            document.getElementById('connectBtn').disabled = connected;
            document.getElementById('disconnectBtn').disabled = !connected;
            document.getElementById('sendBtn').disabled = !connected;
            document.getElementById('status').innerText = connected ? 'Готово. Отправь TON!' : 'Подключи кошелёк';
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                await tonConnectUI.connectWallet();
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка подключения: ' + err.message;
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', async () => {
            try {
                await tonConnectUI.disconnect();
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка отключения';
            }
        });

        function setAmount(val) {
            document.getElementById('amount').value = val;
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const amt = parseFloat(document.getElementById('amount').value);
            if (isNaN(amt) || amt < 0.001) {
                document.getElementById('status').innerText = 'Минимум 0.001 TON';
                return;
            }
            const nano = Math.floor(amt * 1e9).toString();
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{ address: RECEIVER_ADDRESS, amount: nano }]
            };
            try {
                const res = await tonConnectUI.sendTransaction(tx);
                balance += amt;
                localStorage.setItem(balanceKey, balance);
                updateBalance();
                document.getElementById('status').innerText = `Отправлено ${amt} TON! Баланс обновлён. Хэш: ${res.boc.slice(0,12)}...`;
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка: ' + (err.message || 'Отменено');
            }
        });

        setTimeout(() => tonConnectUI.restoreConnection().catch(() => {}), 1000);
    </script>
</body>
</html>
