<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octagon – Liquid Glass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #0a0a1f;
            --card: rgba(20, 22, 48, 0.85);
            --accent: #6366f1;
            --accent-light: #a5b4fc;
            --text: #e0e7ff;
            --glass: blur(20px) saturate(180%);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1f, #1a1433, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,31,0.95);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid rgba(99,102,241,0.2);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 1.55em; font-weight: 800; letter-spacing: -1px; color: white; }
        .wallet-btn {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
        }
        .hero {
            margin: 20px 16px 24px;
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid rgba(165,180,252,0.25);
            border-radius: 28px;
            padding: 32px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .octagon {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
        }
        .hero h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #c4d0ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 0 16px;
            gap: 12px;
            scrollbar-width: none;
        }
        .tab {
            padding: 8px 20px;
            background: rgba(99,102,241,0.15);
            border-radius: 9999px;
            font-size: 0.95em;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(99,102,241,0.5);
        }
        .packages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            padding: 20px 16px;
        }
        .package-card {
            background: var(--card);
            border: 1px solid rgba(165,180,252,0.2);
            border-radius: 24px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .package-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 20px 30px rgba(99,102,241,0.3);
        }
        .package-card .price {
            font-size: 2em;
            font-weight: 700;
            color: var(--accent-light);
        }
        .send-section {
            padding: 0 16px 24px;
        }
        #sendBtn {
            width: 100%;
            padding: 18px;
            font-size: 1.35em;
            font-weight: 700;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }
        #status {
            text-align: center;
            min-height: 60px;
            padding: 0 16px;
            font-size: 1.1em;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,31,0.98);
            backdrop-filter: var(--glass);
            border-top: 1px solid rgba(99,102,241,0.3);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 6px;
            z-index: 1000;
        }
        .nav-item {
            text-align: center;
            color: #64748b;
            font-size: 0.8em;
        }
        .nav-item.active {
            color: var(--accent-light);
        }
        .nav-item i { font-size: 1.5em; display: block; margin-bottom: 2px; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 14px 24px;
            border-radius: 9999px;
            box-shadow: 0 10px 30px rgba(34,197,94,0.4);
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Octagon</div>
        <button id="walletBtn" class="wallet-btn">Подключить TON</button>
    </header>

    <div class="hero">
        <svg class="octagon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="100,30 170,60 170,140 100,170 30,140 30,60" fill="#6366f1" stroke="#a5b4fc" stroke-width="18" stroke-linejoin="round"/>
            <circle cx="100" cy="100" r="28" fill="#e0e7ff"/>
        </svg>
        <h1>Liquid Glass</h1>
        <p style="color:#94a3b8; font-size:1.05em;">Премиум-эффект + верификация на TON</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(this)">Все пакеты</div>
        <div class="tab" onclick="switchTab(this)">Популярные</div>
        <div class="tab" onclick="switchTab(this)">Limited</div>
        <div class="tab" onclick="switchTab(this)">Подарки</div>
    </div>

    <div class="packages" id="packages">
        <!-- карточки генерируются JS -->
    </div>

    <div class="send-section">
        <input type="number" id="amount" value="0.1" min="0.01" step="0.01" placeholder="Своя сумма" style="width:100%; background:rgba(30,30,60,0.6); border:1px solid #6366f1; color:white; padding:16px; border-radius:16px; font-size:1.3em; text-align:center; margin-bottom:12px;">
        <button id="sendBtn" disabled>Купить Liquid Glass</button>
    </div>

    <div id="status">Подключи кошелёк, чтобы продолжить</div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active"><i>🏠</i>Market</div>
        <div class="nav-item"><i>⭐</i>Звёзды</div>
        <div class="nav-item"><i>📦</i>Коллекции</div>
        <div class="nav-item"><i>🛒</i>Корзина</div>
        <div class="nav-item"><i>👤</i>Профиль</div>
    </div>

    <div id="toast" class="toast">Отправлено успешно!</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const RECEIVER = "UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI";
        const userId = Telegram.WebApp.initDataUnsafe.user?.id || "demo";
        let balance = parseFloat(localStorage.getItem(`octagon_sent_${userId}`)) || 0;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
            preferredWallets: ['tonkeeper']
        });

        function updateBalance() {
            document.getElementById('status').innerHTML = `Твой вклад в Octagon: <b>${balance.toFixed(4)} TON</b>`;
        }
        updateBalance();

        // Пакеты в стиле Marketapp
        const packages = [
            { name: "Starter", amount: 0.05, desc: "Базовый эффект" },
            { name: "Glass",   amount: 0.1,  desc: "Полный Liquid Glass" },
            { name: "Premium", amount: 0.5,  desc: "Верификация + NFT" },
            { name: "Elite",   amount: 1.0,  desc: "Эксклюзивный Octagon" }
        ];

        function renderPackages() {
            const container = document.getElementById('packages');
            container.innerHTML = '';
            packages.forEach(pkg => {
                const card = document.createElement('div');
                card.className = 'package-card';
                card.innerHTML = `
                    <div style="font-size:1.1em; margin-bottom:4px;">${pkg.name}</div>
                    <div class="price">${pkg.amount} TON</div>
                    <div style="font-size:0.85em; color:#94a3b8; margin-top:8px;">${pkg.desc}</div>
                `;
                card.onclick = () => {
                    document.getElementById('amount').value = pkg.amount;
                    document.getElementById('sendBtn').scrollIntoView({behavior:'smooth'});
                };
                container.appendChild(card);
            });
        }
        renderPackages();

        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('walletBtn');
            const connected = !!wallet;
            document.getElementById('sendBtn').disabled = !connected;

            if (connected) {
                const addr = wallet.account.address;
                const short = addr.slice(0,6) + '...' + addr.slice(-4);
                btn.textContent = short;
                btn.style.background = 'linear-gradient(90deg, #22c55e, #16a34a)';
                document.getElementById('status').innerHTML = `Подключено ✓<br><small>${short}</small>`;
            } else {
                btn.textContent = 'Подключить TON';
                btn.style.background = 'linear-gradient(90deg, #6366f1, #4f46e5)';
            }
        });

        document.getElementById('walletBtn').addEventListener('click', async () => {
            if (tonConnectUI.connected) {
                await tonConnectUI.disconnect();
            } else {
                try { await tonConnectUI.connectWallet(); }
                catch(e) { console.error(e); }
            }
        });

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const amt = parseFloat(document.getElementById('amount').value);
            if (!amt || amt < 0.01) return alert('Минимум 0.01 TON');

            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{ address: RECEIVER, amount: Math.floor(amt * 1e9).toString() }]
            };

            try {
                const result = await tonConnectUI.sendTransaction(tx);
                balance += amt;
                localStorage.setItem(`octagon_sent_${userId}`, balance);
                updateBalance();

                const toast = document.getElementById('toast');
                toast.style.opacity = 1;
                toast.textContent = `✅ ${amt} TON отправлено!`;
                setTimeout(() => toast.style.opacity = 0, 2800);
            } catch (err) {
                document.getElementById('status').innerText = 'Отменено или ошибка';
            }
        });

        function switchTab(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            // здесь можно фильтровать пакеты в будущем
        }

        // Автовосстановление подключения
        setTimeout(() => tonConnectUI.restoreConnection().catch(()=>{}), 800);
    </script>
</body>
</html>
