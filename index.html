<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octagon – Отправить TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }
        h1 { margin: 20px 0; font-size: 2em; }
        #userInfo { font-size: 1.3em; margin-bottom: 30px; }
        #connectTonBtn {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 20px;
        }
        #connectTonBtn:disabled { background: #555; cursor: not-allowed; }
        .amount-section {
            margin: 30px 0;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
        }
        input[type="number"] {
            width: 180px;
            padding: 12px;
            font-size: 1.2em;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #1e293b;
            color: white;
            text-align: center;
        }
        .preset-btns button {
            background: #334155;
            color: white;
            padding: 10px 20px;
            margin: 8px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #sendTonBtn {
            background: #00c853;
            color: white;
            padding: 18px 40px;
            font-size: 1.4em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,200,83,0.4);
        }
        #sendTonBtn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        #status {
            margin-top: 30px;
            font-size: 1.2em;
            min-height: 60px;
            color: #ffeb3b;
        }
    </style>
</head>
<body>
    <h1>Отправить TON</h1>
    <div id="userInfo">Загрузка...</div>

    <button id="connectTonBtn">Подключить Tonkeeper / Wallet</button>

    <div class="amount-section">
        <p>Сколько TON отправить:</p>
        <input type="number" id="tonAmount" value="0.1" min="0.001" step="0.001" placeholder="0.1">
        <div class="preset-btns">
            <button onclick="setAmount(0.01)">0.01</button>
            <button onclick="setAmount(0.05)">0.05</button>
            <button onclick="setAmount(0.1)">0.1</button>
            <button onclick="setAmount(0.5)">0.5</button>
        </div>
    </div>

    <button id="sendTonBtn" disabled>Отправить TON</button>

    <div id="status">Сначала подключи кошелёк</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        // Показываем имя пользователя
        const user = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('userInfo').innerText = user 
            ? `Привет, ${user.first_name || 'друг'}!` 
            : 'Пользователь не найден';

        // Твой TON-адрес (замени на реальный!)
        const RECEIVER_ADDRESS = 'EQCd56VPexb2uPpoD0u25WPIi5vP1H4tnC4f8d7b1o2cT2cS'; // ← ВСТАВЬ СВОЙ АДРЕС ЗДЕСЬ

        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
            // Для лучшей совместимости с мобильными кошельками в Mini App
            walletsListSource: 'https://raw.githubusercontent.com/ton-blockchain/wallets-list/main/wallets-v4.json'
        });

        // Статус подключения
        tonConnectUI.onStatusChange(wallet => {
            const connected = !!wallet;
            document.getElementById('sendTonBtn').disabled = !connected;
            document.getElementById('status').innerText = connected 
                ? 'Кошелёк подключён! Выбери сумму и отправь.' 
                : 'Кошелёк не подключён';
        });

        // Функция установки суммы пресетом
        function setAmount(value) {
            document.getElementById('tonAmount').value = value;
        }

        // Кнопка отправки
        document.getElementById('sendTonBtn').addEventListener('click', async () => {
            const amountInput = document.getElementById('tonAmount').value;
            const amountTon = parseFloat(amountInput);

            if (isNaN(amountTon) || amountTon <= 0) {
                document.getElementById('status').innerText = 'Введите корректную сумму > 0';
                return;
            }

            // Конвертируем TON → nanoTON (1 TON = 1_000_000_000 nanoTON)
            const nanoAmount = Math.floor(amountTon * 1_000_000_000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600, // 10 минут на подтверждение
                messages: [{
                    address: RECEIVER_ADDRESS,
                    amount: nanoAmount
                    // payload: btoa('Донат от ' + (user?.username || 'аноним')) // опционально
                }]
            };

            document.getElementById('status').innerText = `Отправка ${amountTon} TON... Подтверди в кошельке`;

            try {
                const result = await tonConnectUI.sendTransaction(transaction, {
                    // Улучшает поведение в мобильных кошельках
                    modals: ['before', 'success', 'error'],
                    notifications: ['before', 'success', 'error']
                });
                document.getElementById('status').innerText = `Успех! Транзакция отправлена. Хэш: ${result.boc.slice(0, 20)}...`;
                console.log('Полный результат:', result);
            } catch (error) {
                document.getElementById('status').innerText = 'Ошибка: ' + (error.message || 'Неизвестная ошибка');
                console.error('TON Connect ошибка:', error);
            }
        });
    </script>
</body>
</html>
