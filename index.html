<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octagon – Liquid Glass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(20, 15, 50, 0.35);
            --glass-border: rgba(120, 100, 255, 0.22);
            --accent: #a78bfa;
            --accent-dark: #7c3aed;
            --text: #e0e0ff;
            --blur: blur(20px) saturate(190%);
            --bg-gradient: linear-gradient(135deg, #1e0f3f, #0d142e, #1a0f3e);
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: flow 24s ease infinite;
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header {
            width: 100%;
            padding: 16px 0;
            text-align: center;
            backdrop-filter: var(--blur);
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 2.4em;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 16px rgba(167, 139, 250, 0.7);
        }
        #balance {
            font-size: 1.4em;
            margin: 8px 0 4px;
            color: #d1c4ff;
            text-shadow: 0 0 10px rgba(209, 196, 255, 0.5);
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px 20px;
            margin: 24px 16px;
            width: calc(100% - 32px);
            max-width: 440px;
            box-shadow: inset 0 3px 12px rgba(255,255,255,0.08),
                        0 12px 40px rgba(0,0,0,0.45);
            transition: transform 0.35s ease;
        }
        .glass-card:hover {
            transform: translateY(-6px);
        }
        button {
            width: 100%;
            padding: 18px;
            font-size: 1.4em;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 16px 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #connectBtn {
            background: linear-gradient(45deg, #8b5cf6, #7c3aed);
            color: white;
        }
        #connectBtn:disabled { background: #3a3a4a; cursor: not-allowed; }
        #disconnectBtn {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
        }
        #disconnectBtn:disabled { background: #3a3a4a; cursor: not-allowed; }
        #sendBtn {
            background: linear-gradient(45deg, #10b981, #059669);
            color: white;
            font-size: 1.55em;
            padding: 22px;
        }
        #sendBtn:disabled { background: #3a3a4a; cursor: not-allowed; }
        input[type="number"] {
            width: 100%;
            padding: 16px;
            font-size: 1.5em;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(30, 25, 70, 0.5);
            color: white;
            text-align: center;
            margin: 16px 0;
        }
        .presets {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .presets button {
            background: rgba(120, 100, 255, 0.4);
            color: white;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 16px;
            border: none;
            cursor: pointer;
        }
        #status {
            margin: 24px 20px;
            font-size: 1.25em;
            color: #fde047;
            text-align: center;
            min-height: 80px;
            line-height: 1.4;
        }
        #userInfo {
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
            color: #c4b5fd;
        }
    </style>
</head>
<body>
    <header>
        <h1>Octagon</h1>
        <div id="balance">Отправлено TON: 0.00</div>
    </header>

    <div class="glass-card">
        <div id="userInfo">Загрузка...</div>

        <div class="controls">
            <button id="connectBtn">Подключить кошелёк</button>
            <button id="disconnectBtn" disabled>Отключить</button>
        </div>

        <p style="text-align:center; margin:20px 0 8px; color:#c4b5fd;">Сумма в TON</p>
        <input type="number" id="amount" value="0.1" min="0.001" step="0.001">

        <div class="presets">
            <button onclick="setAmount(0.01)">0.01</button>
            <button onclick="setAmount(0.05)">0.05</button>
            <button onclick="setAmount(0.1)">0.1</button>
            <button onclick="setAmount(0.5)">0.5</button>
        </div>

        <button id="sendBtn" disabled>Отправить</button>
    </div>

    <div id="status">Подключи кошелёк, чтобы отправить TON</div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const user = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('userInfo').innerText = user ? `Привет, ${user.first_name}!` : 'Пользователь не найден';

        const RECEIVER_ADDRESS = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://maivonai.github.io/octagon.github.io/tonconnect-manifest.json',
            walletsListSource: 'https://raw.githubusercontent.com/ton-blockchain/wallets-list/main/wallets-v4.json',
            twaReturnUrl: window.location.href.split('?')[0],
            preferredWallets: ['tonkeeper']
        });

        const userId = user?.id || 'anonymous';
        const balanceKey = `ton_sent_${userId}`;
        let balance = parseFloat(localStorage.getItem(balanceKey)) || 0;
        updateBalanceDisplay();

        function updateBalanceDisplay() {
            document.getElementById('balance').innerText = `Отправлено TON: ${balance.toFixed(4)}`;
        }

        tonConnectUI.onStatusChange(wallet => {
            const connected = !!wallet;
            document.getElementById('connectBtn').innerText = connected ? 'Подключено ✓' : 'Подключить кошелёк';
            document.getElementById('connectBtn').disabled = connected;
            document.getElementById('disconnectBtn').disabled = !connected;
            document.getElementById('sendBtn').disabled = !connected;

            document.getElementById('status').innerText = connected 
                ? 'Готово. Можно отправлять TON' 
                : 'Подключи кошелёк для отправки';
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                await tonConnectUI.connectWallet();
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка подключения: ' + (err.message || 'неизвестно');
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', async () => {
            try {
                await tonConnectUI.disconnect();
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка отключения';
            }
        });

        function setAmount(val) {
            document.getElementById('amount').value = val;
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const amt = parseFloat(document.getElementById('amount').value);
            if (isNaN(amt) || amt < 0.001) {
                document.getElementById('status').innerText = 'Минимум 0.001 TON';
                return;
            }

            const nano = Math.floor(amt * 1e9).toString();
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{ address: RECEIVER_ADDRESS, amount: nano }]
            };

            try {
                const res = await tonConnectUI.sendTransaction(tx);
                balance += amt;
                localStorage.setItem(balanceKey, balance);
                updateBalanceDisplay();
                document.getElementById('status').innerText = `Отправлено ${amt.toFixed(3)} TON\nХэш: ${res.boc.slice(0,12)}...`;
            } catch (err) {
                document.getElementById('status').innerText = 'Ошибка: ' + (err.message || 'отменено пользователем');
            }
        });

        setTimeout(() => tonConnectUI.restoreConnection().catch(() => {}), 1000);
    </script>
</body>
</html>
